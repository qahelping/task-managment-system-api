[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers

markers =
    smoke: Smoke tests
    regression: Regression tests
    api: API tests


# pytest.ini
[pytest]
python_files = test_*.py
python_classes = Test*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    smoke: fast critical tests
    e2e: end-to-end tests
    slow: long-running tests